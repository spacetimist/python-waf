rules:
  # ==========================================
  # KATEGORI 1: Tag HTML Berbahaya
  # Referensi: inspired-by-crs-941160
  # ==========================================
  - id: "XSS-001"
    description: "Deteksi tag script yang umum digunakan untuk XSS"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*script[\\s>]"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "script-tag", "inspired-by-crs-941160"]

  - id: "XSS-002"
    description: "Deteksi tag HTML berbahaya (iframe, object, embed, applet)"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*(iframe|object|embed|applet|meta|base|form|input)[\\s>]"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "dangerous-tags", "inspired-by-crs-941160"]

  - id: "XSS-003"
    description: "Deteksi tag penutup script"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*/\\s*script\\s*>"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "script-tag", "inspired-by-crs-941160"]

  # ==========================================
  # KATEGORI 2: Event Handler JavaScript
  # Referensi: inspired-by-crs-941160
  # ==========================================
  - id: "XSS-004"
    description: "Deteksi event handler JavaScript (onload, onerror, onclick, dll)"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "\\bon(load|error|click|mouseover|mouseout|focus|blur|change|submit|reset|select|keydown|keyup|keypress|dblclick|contextmenu|drag|drop)\\s*="
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "event-handler", "inspired-by-crs-941160"]

  - id: "XSS-005"
    description: "Deteksi event handler lanjutan (onmouseenter, onanimation, dll)"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "\\bon(mouse|animation|transition|pointer|touch|wheel|scroll|resize|before|after)\\w*\\s*="
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "event-handler", "inspired-by-crs-941160"]

  # ==========================================
  # KATEGORI 3: Protokol JavaScript
  # Referensi: inspired-by-crs-941170
  # ==========================================
  - id: "XSS-006"
    description: "Deteksi protokol javascript: dalam atribut href atau src"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "javascript\\s*:"
    transform: ["lowercase", "url_decode", "html_decode", "remove_whitespace"]
    severity: "critical"
    score: 5
    tags: ["xss", "javascript-protocol", "inspired-by-crs-941170"]

  - id: "XSS-007"
    description: "Deteksi protokol vbscript dan data URI berbahaya"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(vbscript\\s*:|data\\s*:\\s*text/html)"
    transform: ["lowercase", "url_decode", "html_decode", "remove_whitespace"]
    severity: "critical"
    score: 5
    tags: ["xss", "dangerous-protocol", "inspired-by-crs-941170"]

  # ==========================================
  # KATEGORI 4: Encoding XSS
  # Referensi: inspired-by-crs-941160, inspired-by-crs-941170
  # ==========================================
  - id: "XSS-008"
    description: "Deteksi HTML entity encoding untuk bypass filter (<, >)"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(&lt;|&gt;|&amp;|&#x?[0-9a-f]+;).*(script|on\\w+=|javascript)"
    transform: ["lowercase", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "encoding-bypass", "inspired-by-crs-941160"]

  - id: "XSS-009"
    description: "Deteksi Unicode encoding untuk bypass filter"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(\\\\u00[3-7][0-9a-f]|%u00[3-7][0-9a-f]).{0,20}(script|javascript)"
    transform: ["lowercase", "url_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "unicode-bypass", "custom"]

  # ==========================================
  # KATEGORI 5: DOM-based XSS
  # ==========================================
  - id: "XSS-010"
    description: "Deteksi manipulasi DOM yang berbahaya"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(document\\.(write|writeln|cookie|location|referrer)|window\\.(location|open)|innerHTML|outerHTML)"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "dom-xss", "custom"]

  - id: "XSS-011"
    description: "Deteksi eval dan fungsi eksekusi JavaScript berbahaya"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "\\b(eval|setTimeout|setInterval|Function|execScript)\\s*\\("
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "js-execution", "custom"]

  # ==========================================
  # KATEGORI 6: Polyglot XSS
  # Referensi: inspired-by-crs-941170
  # ==========================================
  - id: "XSS-012"
    description: "Deteksi payload polyglot XSS yang umum digunakan"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(\"|')(\\s*>|\\s*/>|\\s+\\w+=).{0,30}(script|javascript|on\\w+=)"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "polyglot", "custom"]

  - id: "XSS-013"
    description: "Deteksi XSS melalui atribut src dan href yang berbahaya"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(src|href|action|formaction|xlink:href)\\s*=\\s*['\"]?\\s*(javascript|vbscript|data\\s*:)"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "attribute-injection", "inspired-by-crs-941170"]

  # ==========================================
  # KATEGORI 7: Aturan Tambahan dari Analisis Payload
  # ==========================================
  - id: "XSS-014"
    description: "Deteksi alert() dan fungsi JavaScript berbahaya tanpa tag script"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "alert\\s*\\(|confirm\\s*\\(|prompt\\s*\\("
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "js-alert", "custom"]

  - id: "XSS-015"
    description: "Deteksi tag HTML umum untuk injeksi konten"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*(h[1-6]|p|div|span|marquee|button)[\\s>/]"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "html-injection", "inspired-by-crs-941160"]

  - id: "XSS-016"
    description: "Deteksi event handler pada tag marquee dan elemen animasi"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(marquee|button|form).*on(start|finish|formchange)\\s*="
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "event-handler", "inspired-by-crs-941160"]

  - id: "XSS-017"
    description: "Deteksi XSS attribute vector (xlink:href, @import, base64, formaction)"
    phase: 2
    target: ["args", "form", "body", "query_string", "headers"]
    operator: "regex"
    pattern: "(?:xlink:href|data:text/html|@import|;base64|formaction)"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "attribute-vector", "inspired-by-crs-941170"]

  - id: "XSS-018"
    description: "Deteksi javascript dengan HTML entity encoding"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "j(?:&#[0-9a-fx]+;?)*a(?:&#[0-9a-fx]+;?)*v(?:&#[0-9a-fx]+;?)*a(?:&#[0-9a-fx]+;?)*s(?:&#[0-9a-fx]+;?)*c(?:&#[0-9a-fx]+;?)*r(?:&#[0-9a-fx]+;?)*i(?:&#[0-9a-fx]+;?)*p(?:&#[0-9a-fx]+;?)*t(?:&#[0-9a-fx]+;?)*:"
    transform: ["lowercase", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "js-encoding", "inspired-by-crs-941210"]

  - id: "XSS-019"
    description: "Deteksi tag HTML jarang untuk XSS (layer, ilayer, xml, embed)"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*(?:layer|ilayer|xml\\s+src|isindex|listing|plaintext|xmp)[\\s>]"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "rare-tags", "inspired-by-crs-941160"]

  - id: "XSS-020"
    description: "Deteksi SVG dan namespace XML untuk XSS"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*svg[\\s>/]|xmlns\\s*:|xlink:|<\\s*(?:feimage|fescript|animate)[\\s>/]"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "svg-xss", "inspired-by-crs-941130"]

  - id: "XSS-021"
    description: "Deteksi CSS expression dan behavior untuk XSS"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(?:expression\\s*\\(|behavior\\s*:\\s*url|binding\\s*:\\s*url|-moz-binding)"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "critical"
    score: 5
    tags: ["xss", "css-xss", "inspired-by-crs-941170"]

  # ==========================================
  # RULES CUSTOM TAMBAHAN
  # Berdasarkan analisis payload yang lolos pengujian
  # ==========================================
  - id: "XSS-022"
    description: "Deteksi encoding karakter < tanpa konteks keyword (percent, entity, decimal)"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(%3c|&lt;?|&LT;?|&#0*60;?|&#x0*3c;?)"
    transform: ["lowercase"]
    severity: "high"
    score: 3
    tags: ["xss", "encoding-bypass", "custom"]

  - id: "XSS-023"
    description: "Deteksi UTF-7 encoding untuk XSS bypass"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "\\+ADw-|\\+AFs-|\\+ACo-|\\+AGg-"
    transform: []
    severity: "critical"
    score: 5
    tags: ["xss", "utf7-bypass", "custom"]

  - id: "XSS-024"
    description: "Deteksi tag LINK, XML, import namespace untuk XSS"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*(link|xml|import|namespace)\\b"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "rare-tags", "custom"]

  - id: "XSS-025"
    description: "Deteksi processing instruction XML berbahaya"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\?\\s*(xml|import|php)"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "xml-injection", "custom"]

  - id: "XSS-026"
    description: "Deteksi atribut datasrc dan datafld untuk injeksi data IE"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(datasrc|datafld|dataformatas)\\s*="
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "ie-injection", "custom"]

  - id: "XSS-027"
    description: "Deteksi Base64 encoded payload SVG atau script"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(svg|script|javascript|alert|onerror)"
    transform: ["url_decode", "base64_decode", "lowercase"]
    severity: "high"
    score: 3
    tags: ["xss", "base64-bypass", "custom"]

  - id: "XSS-028"
    description: "Deteksi SVG namespace dan elemen SVG lanjutan"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*svg\\s*:|<\\s*svg:(svg|rect|circle|script|animate)[\\s>/]"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "svg-namespace", "custom"]

  - id: "XSS-029"
    description: "Deteksi tag style standalone dan font-face injection"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "<\\s*style[\\s>]|@font-face|@import\\s"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "css-injection", "custom"]

  - id: "XSS-030"
    description: "Deteksi assignment location dan jQuery click untuk XSS"
    phase: 2
    target: ["args", "form", "body", "query_string"]
    operator: "regex"
    pattern: "(location\\s*=\\s*[\"']?http|\\.click\\s*\\(|\\$\\s*\\()"
    transform: ["lowercase", "url_decode", "html_decode"]
    severity: "high"
    score: 3
    tags: ["xss", "js-redirect", "custom"]
